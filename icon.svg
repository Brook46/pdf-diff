<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <clipPath id="page-clip">
      <path d="M256 168 H608 L768 328 V856 H256 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded background tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Document silhouette: corner fold + body -->
  <g clip-path="url(#page-clip)">
    <rect x="256" y="168" width="512" height="688" fill="#ffffff"/>
    <!-- Left (old) half kept clean; right (new) half tinted -->
    <rect x="512" y="168" width="256" height="688" fill="#f2f4f8"/>
    <!-- Highlighter swipe on the right half -->
    <rect x="544" y="430" width="200" height="60" fill="#ffd24d" opacity="0.9"/>
    <!-- Text lines: old half -->
    <g fill="#1a1d23">
      <rect x="304" y="368" width="160" height="14" rx="3"/>
      <rect x="304" y="408" width="180" height="14" rx="3"/>
      <rect x="304" y="448" width="120" height="14" rx="3"/>
      <rect x="304" y="528" width="180" height="14" rx="3"/>
      <rect x="304" y="568" width="140" height="14" rx="3"/>
      <rect x="304" y="648" width="180" height="14" rx="3"/>
    </g>
    <!-- Text lines: new half (with one struck) -->
    <g fill="#1a1d23">
      <rect x="544" y="368" width="160" height="14" rx="3"/>
      <rect x="544" y="408" width="180" height="14" rx="3"/>
      <rect x="544" y="448" width="120" height="14" rx="3"/>
      <rect x="544" y="528" width="180" height="14" rx="3"/>
      <rect x="544" y="568" width="140" height="14" rx="3"/>
      <rect x="544" y="648" width="180" height="14" rx="3"/>
    </g>
    <!-- strike on one new line -->
    <line x1="304" y1="455" x2="424" y2="455" stroke="#c0392b" stroke-width="4"/>
  </g>

  <!-- Document outline -->
  <path d="M256 168 H608 L768 328 V856 H256 Z" fill="none" stroke="#0f1115" stroke-width="14" stroke-linejoin="round"/>
  <!-- Corner fold -->
  <path d="M608 168 V328 H768" fill="none" stroke="#0f1115" stroke-width="14" stroke-linejoin="round"/>

  <!-- Split line down the middle -->
  <line x1="512" y1="168" x2="512" y2="856" stroke="#0f1115" stroke-width="10" stroke-dasharray="20 14"/>

  <!-- Diagonal "old → new" arrow -->
  <g stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M210 880 L420 760"/>
    <path d="M380 740 L420 760 L400 800"/>
  </g>
</svg>
